# @see docs/specs/afx-packs/spec.md#FR-1
# @see docs/specs/afx-packs/spec.md#FR-2
# @see docs/specs/afx-packs/spec.md#FR-3
# @see docs/specs/afx-packs/design.md#11-pack-manifests

name: afx-pack-qa
description: QA Engineer role pack — testing, review, and quality assurance
category: role

includes:
  # AFX-built skills (guardrails baked in, hosted in AFX repo)
  - repo: rixrix/afx
    path: skills/qa/
    items:
      - afx-qa-methodology # QA workflow with @see tracing + two-stage verify
      - afx-spec-test-planning # Test plans linked to spec tasks

  # External skills from Anthropic (pristine — SKILL.md format)
  - repo: anthropics/skills
    path: skills/
    items:
      - webapp-testing

  # External skills from OpenAI (pristine — SKILL.md + openai.yaml)
  - repo: openai/skills
    path: skills/.curated/
    items:
      - playwright

  # Claude Code plugins (pristine — .claude-plugin/ format)
  - repo: anthropics/claude-code
    path: plugins/
    items:
      - code-review
      - pr-review-toolkit
